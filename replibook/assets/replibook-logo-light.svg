<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <linearGradient id="iconGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <filter id="glowL">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="520" height="140" rx="16" fill="#F8FAFC"/>

  <!-- ── Icon Mark ── -->
  <rect x="22" y="30" width="72" height="88" rx="7" fill="#BAE6FD" opacity="0.6"/>
  <rect x="16" y="22" width="72" height="88" rx="7" fill="#7DD3FC"/>
  <!-- Code lines on back page -->
  <rect x="27" y="36" width="38" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.3"/>
  <rect x="27" y="44" width="50" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.2"/>
  <rect x="27" y="52" width="30" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.3"/>

  <!-- Front page -->
  <rect x="30" y="14" width="72" height="88" rx="7" fill="url(#iconGradL)" filter="url(#glowL)"/>

  <!-- Code lines on front page -->
  <rect x="41" y="30" width="20" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.75"/>
  <rect x="65" y="30" width="26" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.45"/>
  <rect x="41" y="40" width="48" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.6"/>
  <rect x="41" y="50" width="14" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.75"/>
  <rect x="59" y="50" width="30" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.45"/>
  <rect x="41" y="60" width="42" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.6"/>
  <rect x="41" y="70" width="22" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.75"/>
  <rect x="67" y="70" width="18" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.45"/>
  <rect x="41" y="80" width="36" height="3.5" rx="1.75" fill="#0C4A6E" opacity="0.6"/>

  <!-- Scan line -->
  <line x1="30" y1="88" x2="102" y2="88" stroke="#0C4A6E" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 3"/>

  <!-- Arrow -->
  <g transform="translate(86, 88)" fill="none">
    <circle cx="11" cy="12" r="10" fill="white" opacity="0.9"/>
    <polyline points="7,12 15,12" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round"/>
    <polyline points="12,9 15,12 12,15" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="126" y="90"
    font-family="'Space Grotesk', 'DM Sans', 'Trebuchet MS', sans-serif"
    font-size="52" font-weight="700" letter-spacing="-1"
    fill="#0F172A">Repli</text>
  <text x="283" y="90"
    font-family="'Space Grotesk', 'DM Sans', 'Trebuchet MS', sans-serif"
    font-size="52" font-weight="700" letter-spacing="-1"
    fill="#0EA5E9">book</text>

  <!-- Tagline -->
  <text x="127" y="114"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="13" letter-spacing="1.5"
    fill="#94A3B8">SCAN · GENERATE · REPRODUCE</text>
</svg>
